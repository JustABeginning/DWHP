services:
  docker-wireguard:
    container_name: docker-wireguard
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv4.ip_forward: 1
      net.ipv6.conf.all.forwarding: 1
      net.ipv6.conf.default.forwarding: 1
    build:
      context: .
      args:
        SSH_USER: "$SSH_USER"
        SSH_PASSWORD: "$SSH_PASSWORD"
        ROOT_PASSWORD: "$ROOT_PASSWORD"
      dockerfile: Dockerfile
    image: docker-wireguard:latest
    tty: true
    ports:
      - 2224:22
      - 51820:51820/udp
    networks:
      - docker-wireguard-network
    volumes:
      - type: bind
        source: ./storage
        target: /app/storage

networks:
  docker-wireguard-network:
    enable_ipv6: true

volumes:
  storage:
